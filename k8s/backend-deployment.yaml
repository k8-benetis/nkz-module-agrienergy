# =============================================================================
# AgriEnergy Orchestrator Backend Deployment
# =============================================================================
# Backend API service for AgriEnergy Orchestrator module
# =============================================================================

---
# Deployment: AgriEnergy Orchestrator Backend Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrienergy-backend
  namespace: nekazari
  labels:
    app: agrienergy-backend
    component: backend
    module: agrienergy
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agrienergy-backend
  template:
    metadata:
      labels:
        app: agrienergy-backend
        component: backend
        module: agrienergy
    spec:
      # No imagePullSecrets: public GHCR images pull anonymously (CLAUDE.md)
      containers:
        - name: backend
          image: ghcr.io/k8-benetis/nkz-module-agrienergy/agrienergy-backend:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: "AgriEnergy Orchestrator"
            - name: DEBUG
              value: "false"
            - name: API_PREFIX
              value: "/api/agrienergy"
            # CORS — explicit origin whitelist (never *)
            - name: CORS_ORIGINS
              value: '["https://your-frontend-domain"]'
            # Keycloak Configuration
            - name: KEYCLOAK_URL
              value: "https://auth.your-domain/auth"  # Override per environment
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_AUDIENCE
              value: "account"
            # Orion-LD URL for creating entities (e.g. AgriSolarPark). Required for POST /parks.
            - name: CONTEXT_BROKER_URL
              value: "http://orion-ld-service:1026/ngsi-ld/v1"  # Override if Orion is behind another host
            # Service-to-service auth (optional)
            - name: MODULE_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: module-secrets
                  key: management-key
                  optional: true
          # Database (if needed - uncomment and configure)
          # - name: DATABASE_URL
          #   valueFrom:
          #     secretKeyRef:
          #       name: postgresql-secret
          #       key: connection-string
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

---
# Service: AgriEnergy Orchestrator Backend API
apiVersion: v1
kind: Service
metadata:
  name: agrienergy-api-service
  namespace: nekazari
  labels:
    app: agrienergy-backend
    module: agrienergy
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: agrienergy-backend
